<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de compras</title>
</head>
<body>

    <a href="compras.html">Voltar</a>
    <h1>Cadastre a nova compra</h1>

    <div>
        <label for="data-hora">Data e hora da compra</label>
        <input type="datetime" id="data-hora">
    </div>
    <div>
        <label for="Valor">Valor</label>
        <input type="text" id="valor">
    </div>
    <div>
        <label for="fornecedor">Fornecedor</label>
        <select id="fornecedor">
            <option value="">Selecione um fornecedor</option>
        </select>
    </div>

    <div><button id="cadastrar">Cadastrar</button></div>
    


    <script src="assets/js/compras-form.js"></script>
</body>
</html>
